version: "3.9"

services:

  redis:
    image: redis:7-alpine

    container_name: catalog-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

  app:

    build: .

    container_name: catalog-gateway

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - redis